<?xml version="1.0" encoding="UTF-8"?>
<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="500" height="500" fill="white"/>
  <!-- Hockey rink -->
  <rect x="50" y="200" width="400" height="200" fill="white" stroke="#0099DD" stroke-width="4" rx="100"/>
  <!-- Center line -->
  <line x1="250" y1="200" x2="250" y2="400" stroke="#CC0000" stroke-width="3"/>
  <!-- Hockey stick -->
  <rect x="150" y="180" width="8" height="120" fill="#8B5E2A" stroke="#000" stroke-width="2"/>
  <path d="M 150 300 Q 130 310 130 320 Q 130 330 150 320" fill="#8B5E2A" stroke="#000" stroke-width="2"/>
  <!-- Puck -->
  <circle cx="200" cy="320" r="8" fill="#000"/>
  <!-- Goal -->
  <rect x="50" y="270" width="20" height="60" fill="none" stroke="#CC0000" stroke-width="3"/>
  <!-- Player (simplified) -->
  <circle cx="180" cy="220" r="15" fill="#FFD5B0" stroke="#000" stroke-width="2"/>
  <rect x="170" y="235" width="20" height="40" fill="#0099DD" stroke="#000" stroke-width="2"/>
</svg>