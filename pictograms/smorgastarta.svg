<?xml version="1.0" encoding="UTF-8"?>
<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="500" height="500" fill="white"/>
  <!-- Plate -->
  <ellipse cx="250" cy="350" rx="180" ry="35" fill="white" stroke="#000" stroke-width="3"/>
  <!-- Cake layers -->
  <rect x="120" y="250" width="260" height="40" fill="#FFD700" stroke="#000" stroke-width="3"/>
  <rect x="120" y="210" width="260" height="40" fill="#FFD700" stroke="#000" stroke-width="3"/>
  <!-- Topping layer (cream/mayo) -->
  <rect x="120" y="200" width="260" height="10" fill="white" stroke="#000" stroke-width="2"/>
  <!-- Garnish -->
  <circle cx="180" cy="195" r="8" fill="#CC0000"/> <!-- tomato -->
  <circle cx="220" cy="195" r="8" fill="#66AA00"/> <!-- cucumber -->
  <circle cx="260" cy="195" r="8" fill="#FF8800"/> <!-- carrot -->
  <circle cx="300" cy="195" r="8" fill="#FF66CC"/> <!-- shrimp -->
  <circle cx="320" cy="195" r="8" fill="#FFD700"/> <!-- egg -->
</svg>