<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Person experiencing anxiety -->
  <circle cx="250" cy="200" r="30" fill="#FFD5B0" stroke="#000" stroke-width="3.5"/>
  
  <!-- Worried expression -->
  <path d="M240 185 Q235 180 240 175 Q245 180 240 185" fill="#000"/>
  <path d="M260 185 Q255 180 260 175 Q265 180 260 185" fill="#000"/>
  <path d="M235 215 Q250 210 265 215" fill="none" stroke="#000" stroke-width="3"/>
  
  <!-- Furrowed brow -->
  <path d="M230 175 Q240 170 250 175" fill="none" stroke="#000" stroke-width="2"/>
  <path d="M250 175 Q260 170 270 175" fill="none" stroke="#000" stroke-width="2"/>
  
  <!-- Body hunched/tense -->
  <rect x="240" y="230" width="20" height="50" fill="#999999" stroke="#000" stroke-width="3.5"/>
  
  <!-- Arms crossed/self-hugging -->
  <ellipse cx="220" cy="260" rx="8" ry="25" fill="#FFD5B0" stroke="#000" stroke-width="3.5" transform="rotate(30 220 260)"/>
  <ellipse cx="280" cy="260" rx="8" ry="25" fill="#FFD5B0" stroke="#000" stroke-width="3.5" transform="rotate(-30 280 260)"/>
  
  <!-- Legs -->
  <rect x="235" y="280" width="10" height="40" fill="#0099DD" stroke="#000" stroke-width="3.5"/>
  <rect x="255" y="280" width="10" height="40" fill="#0099DD" stroke="#000" stroke-width="3.5"/>
  
  <!-- Feet -->
  <ellipse cx="240" cy="330" rx="12" ry="8" fill="#000"/>
  <ellipse cx="260" cy="330" rx="12" ry="8" fill="#000"/>
  
  <!-- Thought bubbles with worries -->
  <ellipse cx="150" cy="120" rx="40" ry="25" fill="#FFFFFF" stroke="#000" stroke-width="3.5"/>
  <circle cx="170" cy="140" r="8" fill="#FFFFFF" stroke="#000" stroke-width="3.5"/>
  <circle cx="185" cy="155" r="6" fill="#FFFFFF" stroke="#000" stroke-width="3.5"/>
  <circle cx="195" cy="170" r="4" fill="#FFFFFF" stroke="#000" stroke-width="3.5"/>
  
  <!-- Worry symbols in thought bubble -->
  <path d="M130 110 L150 130 M130 130 L150 110" stroke="#CC0000" stroke-width="3"/>
  <path d="M155 110 L165 110 L160 125 Z" fill="#FFD700" stroke="#000" stroke-width="2"/>
  
  <!-- Second thought bubble -->
  <ellipse cx="350" cy="130" rx="35" ry="20" fill="#FFFFFF" stroke="#000" stroke-width="3.5"/>
  <circle cx="330" cy="145" r="7" fill="#FFFFFF" stroke="#000" stroke-width="3.5"/>
  <circle cx="320" cy="155" r="5" fill="#FFFFFF" stroke="#000" stroke-width="3.5"/>
  <circle cx="310" cy="165" r="3" fill="#FFFFFF" stroke="#000" stroke-width="3.5"/>
  
  <!-- Question mark in thought bubble -->
  <path d="M340 120 Q350 115 355 125 Q350 135 345 135 M345 145 L345 150" fill="none" stroke="#000" stroke-width="3"/>
  
  <!-- Stress/anxiety waves around person -->
  <path d="M180 180 Q185 175 190 180" fill="none" stroke="#FF8800" stroke-width="3"/>
  <path d="M170 200 Q175 195 180 200" fill="none" stroke="#FF8800" stroke-width="3"/>
  <path d="M310 180 Q315 175 320 180" fill="none" stroke="#FF8800" stroke-width="3"/>
  <path d="M320 200 Q325 195 330 200" fill="none" stroke="#FF8800" stroke-width="3"/>
  
  <!-- Heart rate/palpitation symbol -->
  <path d="M280 240 Q285 230 290 240 Q295 250 300 240 Q305 230 310 240" 
        fill="none" stroke="#CC0000" stroke-width="3"/>
  
  <!-- Sweating -->
  <ellipse cx="230" cy="190" rx="2" ry="6" fill="#0099DD"/>
  <ellipse cx="270" cy="195" rx="2" ry="6" fill="#0099DD"/>
  <ellipse cx="240" cy="220" rx="2" ry="5" fill="#0099DD"/>
  <ellipse cx="260" cy="225" rx="2" ry="5" fill="#0099DD"/>
  
  <!-- Stomach knot symbol -->
  <ellipse cx="250" cy="250" rx="8" ry="12" fill="none" stroke="#CC0000" stroke-width="2"/>
  <path d="M245 250 Q250 245 255 250 Q250 255 245 250" fill="none" stroke="#CC0000" stroke-width="2"/>
</svg>