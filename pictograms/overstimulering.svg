<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Person covering ears -->
  <circle cx="250" cy="200" r="30" fill="#FFD5B0" stroke="#000" stroke-width="3.5"/>
  
  <!-- Overwhelmed facial expression -->
  <path d="M240 190 Q235 185 240 180 Q245 185 240 190" fill="#000"/>
  <path d="M260 190 Q255 185 260 180 Q265 185 260 190" fill="#000"/>
  <path d="M235 210 Q250 225 265 210" fill="none" stroke="#000" stroke-width="3"/>
  
  <!-- Hands covering ears -->
  <circle cx="210" cy="200" r="12" fill="#FFD5B0" stroke="#000" stroke-width="3.5"/>
  <circle cx="290" cy="200" r="12" fill="#FFD5B0" stroke="#000" stroke-width="3.5"/>
  
  <!-- Body -->
  <rect x="240" y="230" width="20" height="50" fill="#0099DD" stroke="#000" stroke-width="3.5"/>
  
  <!-- Legs -->
  <rect x="235" y="280" width="10" height="40" fill="#66AA00" stroke="#000" stroke-width="3.5"/>
  <rect x="255" y="280" width="10" height="40" fill="#66AA00" stroke="#000" stroke-width="3.5"/>
  
  <!-- Feet -->
  <ellipse cx="240" cy="330" rx="12" ry="8" fill="#000"/>
  <ellipse cx="260" cy="330" rx="12" ry="8" fill="#000"/>
  
  <!-- Sound waves/noise -->
  <path d="M100 150 Q120 130 140 150" fill="none" stroke="#CC0000" stroke-width="4"/>
  <path d="M80 170 Q100 150 120 170" fill="none" stroke="#CC0000" stroke-width="4"/>
  <path d="M120 180 Q140 160 160 180" fill="none" stroke="#CC0000" stroke-width="4"/>
  
  <path d="M360 150 Q380 130 400 150" fill="none" stroke="#CC0000" stroke-width="4"/>
  <path d="M380 170 Q400 150 420 170" fill="none" stroke="#CC0000" stroke-width="4"/>
  <path d="M340 180 Q360 160 380 180" fill="none" stroke="#CC0000" stroke-width="4"/>
  
  <!-- Bright lights -->
  <path d="M150 50 L170 90 M160 40 L160 100 M140 60 L180 80" stroke="#FFD700" stroke-width="4"/>
  <path d="M350 50 L370 90 M360 40 L360 100 M340 60 L380 80" stroke="#FFD700" stroke-width="4"/>
  
  <!-- Visual overstimulation (patterns) -->
  <rect x="50" y="250" width="15" height="15" fill="#FF8800"/>
  <rect x="65" y="265" width="15" height="15" fill="#FF66CC"/>
  <rect x="50" y="280" width="15" height="15" fill="#66AA00"/>
  <rect x="65" y="295" width="15" height="15" fill="#0099DD"/>
  
  <rect x="435" y="250" width="15" height="15" fill="#FFD700"/>
  <rect x="420" y="265" width="15" height="15" fill="#CC0000"/>
  <rect x="435" y="280" width="15" height="15" fill="#FF66CC"/>
  <rect x="420" y="295" width="15" height="15" fill="#66AA00"/>
  
  <!-- Smell lines -->
  <path d="M100 300 Q110 290 120 300 Q130 290 140 300" fill="none" stroke="#999999" stroke-width="3"/>
  <path d="M360 300 Q370 290 380 300 Q390 290 400 300" fill="none" stroke="#999999" stroke-width="3"/>
  
  <!-- Touch/texture symbols -->
  <circle cx="100" cy="350" r="8" fill="#8B5E2A"/>
  <rect x="95" y="345" width="10" height="10" fill="none" stroke="#8B5E2A" stroke-width="2"/>
  
  <circle cx="400" cy="350" r="8" fill="#8B5E2A"/>
  <rect x="395" y="345" width="10" height="10" fill="none" stroke="#8B5E2A" stroke-width="2"/>
  
  <!-- Stress indicators around head -->
  <path d="M190 170 Q195 160 200 170" fill="none" stroke="#FF8800" stroke-width="3"/>
  <path d="M300 170 Q305 160 310 170" fill="none" stroke="#FF8800" stroke-width="3"/>
  <path d="M220 150 Q225 140 230 150" fill="none" stroke="#FF8800" stroke-width="3"/>
  <path d="M270 150 Q275 140 280 150" fill="none" stroke="#FF8800" stroke-width="3"/>
</svg>