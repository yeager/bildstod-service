<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Can/tin -->
  <rect x="150" y="200" width="200" height="120" fill="#999999" stroke="#000" stroke-width="3.5"/>
  
  <!-- Can top -->
  <ellipse cx="250" cy="200" rx="100" ry="15" fill="#FFFFFF" stroke="#000" stroke-width="3.5"/>
  
  <!-- Can label -->
  <rect x="160" y="230" width="180" height="60" fill="#0099DD"/>
  
  <!-- Label text representation -->
  <rect x="180" y="245" width="140" height="8" fill="#FFFFFF"/>
  <rect x="180" y="260" width="100" height="8" fill="#FFFFFF"/>
  <rect x="180" y="275" width="120" height="8" fill="#FFFFFF"/>
  
  <!-- Fish illustration on label -->
  <ellipse cx="280" cy="250" rx="25" ry="8" fill="#FFFFFF"/>
  <path d="M305 250 L320 245 L320 255 Z" fill="#FFFFFF"/>
  <circle cx="290" cy="248" r="2" fill="#0099DD"/>
  
  <!-- Opened can showing fish -->
  <ellipse cx="250" cy="350" rx="80" ry="12" fill="#999999" stroke="#000" stroke-width="3.5"/>
  <ellipse cx="240" cy="340" rx="35" ry="10" fill="#CC0000"/>
  <ellipse cx="260" cy="345" rx="30" ry="8" fill="#CC0000"/>
  
  <!-- Smell lines -->
  <path d="M200 180 Q195 160 200 140" fill="none" stroke="#999999" stroke-width="2"/>
  <path d="M250 170 Q245 150 250 130" fill="none" stroke="#999999" stroke-width="2"/>
  <path d="M300 180 Q305 160 300 140" fill="none" stroke="#999999" stroke-width="2"/>
</svg>