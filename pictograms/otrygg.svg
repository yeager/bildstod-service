<?xml version="1.0" encoding="UTF-8"?>
<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <!-- White background -->
  <rect width="500" height="500" fill="white"/>
  
  <!-- Face -->
  <circle cx="250" cy="250" r="80" fill="#FFD5B0" stroke="#000" stroke-width="3.5"/>
  
  <!-- Worried eyes -->
  <circle cx="230" cy="230" r="4" fill="#000"/>
  <circle cx="270" cy="230" r="4" fill="#000"/>
  
  <!-- Concerned frown -->
  <path d="M 220 280 Q 250 260 280 280" stroke="#000" stroke-width="3" fill="none"/>
  
  <!-- Worried eyebrows -->
  <path d="M 215 210 Q 235 205 245 215" stroke="#000" stroke-width="2" fill="none"/>
  <path d="M 255 215 Q 265 205 285 210" stroke="#000" stroke-width="2" fill="none"/>
  
  <!-- Danger symbols around -->
  <!-- Warning triangles -->
  <path d="M 120 120 L 140 160 L 100 160 Z" fill="#CC0000" stroke="#000" stroke-width="2"/>
  <text x="120" y="150" fill="white" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold">!</text>
  
  <path d="M 380 120 L 400 160 L 360 160 Z" fill="#CC0000" stroke="#000" stroke-width="2"/>
  <text x="380" y="150" fill="white" text-anchor="middle" font-family="Arial" font-size="20" font-weight="bold">!</text>
  
  <!-- Broken protection -->
  <path d="M 100 350 L 160 350" stroke="#CC0000" stroke-width="4"/>
  <path d="M 340 350 L 400 350" stroke="#CC0000" stroke-width="4"/>
  <path d="M 130 320 L 130 380" stroke="#CC0000" stroke-width="4"/>
  <path d="M 370 320 L 370 380" stroke="#CC0000" stroke-width="4"/>
</svg>