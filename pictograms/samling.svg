<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <!-- Circle Time / Samling (preschool group gathering) -->
  <!-- Floor mat circle -->
  <ellipse cx="250" cy="300" rx="180" ry="100" fill="#BBDEFB" stroke="#000" stroke-width="3"/>
  <!-- Children sitting in circle -->
  <!-- Child 1 (top) -->
  <circle cx="250" cy="200" r="18" fill="#F5DEB3" stroke="#000" stroke-width="2.5"/>
  <rect x="240" y="218" width="20" height="22" rx="3" fill="#E53935" stroke="#000" stroke-width="2"/>
  <!-- Child 2 (top-right) -->
  <circle cx="350" cy="240" r="16" fill="#D2B48C" stroke="#000" stroke-width="2.5"/>
  <rect x="341" y="256" width="18" height="20" rx="3" fill="#2196F3" stroke="#000" stroke-width="2"/>
  <!-- Child 3 (right) -->
  <circle cx="390" cy="310" r="16" fill="#F5DEB3" stroke="#000" stroke-width="2.5"/>
  <rect x="381" y="326" width="18" height="20" rx="3" fill="#4CAF50" stroke="#000" stroke-width="2"/>
  <!-- Child 4 (bottom-right) -->
  <circle cx="330" cy="370" r="16" fill="#D2B48C" stroke="#000" stroke-width="2.5"/>
  <rect x="321" y="386" width="18" height="20" rx="3" fill="#FF9800" stroke="#000" stroke-width="2"/>
  <!-- Child 5 (bottom-left) -->
  <circle cx="170" cy="370" r="16" fill="#F5DEB3" stroke="#000" stroke-width="2.5"/>
  <rect x="161" y="386" width="18" height="20" rx="3" fill="#9C27B0" stroke="#000" stroke-width="2"/>
  <!-- Child 6 (left) -->
  <circle cx="110" cy="310" r="16" fill="#D2B48C" stroke="#000" stroke-width="2.5"/>
  <rect x="101" y="326" width="18" height="20" rx="3" fill="#FF5722" stroke="#000" stroke-width="2"/>
  <!-- Child 7 (top-left) -->
  <circle cx="150" cy="240" r="16" fill="#F5DEB3" stroke="#000" stroke-width="2.5"/>
  <rect x="141" y="256" width="18" height="20" rx="3" fill="#FFEB3B" stroke="#000" stroke-width="2"/>
  <!-- Teacher (larger, at top) -->
  <circle cx="250" cy="130" r="25" fill="#F5DEB3" stroke="#000" stroke-width="3"/>
  <path d="M225 155 L225 195 L275 195 L275 155 Z" fill="#1976D2" stroke="#000" stroke-width="2.5"/>
  <!-- Book in teacher's hands -->
  <rect x="235" y="175" width="30" height="22" rx="2" fill="#8D6E63" stroke="#000" stroke-width="2"/>
  <!-- Musical notes (singing) -->
  <text x="300" cy="160" font-size="24" fill="#666">♪</text>
  <text x="320" cy="140" font-size="18" fill="#666">♫</text>
</svg>