<?xml version="1.0" encoding="UTF-8"?>
<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="500" height="500" fill="#000"/>
  <!-- Dark sky -->
  <rect width="500" height="300" fill="#000"/>
  <!-- Ground -->
  <rect y="400" width="500" height="100" fill="#333"/>
  <!-- Aurora bands -->
  <path d="M 0 100 Q 250 80 500 120 Q 250 140 0 160" fill="#66AA00" stroke="none"/>
  <path d="M 0 160 Q 250 140 500 180 Q 250 200 0 220" fill="#0099DD" stroke="none"/>
  <path d="M 0 220 Q 250 200 500 240 Q 250 260 0 280" fill="#FF66CC" stroke="none"/>
  <!-- Stars -->
  <circle cx="100" cy="60" r="2" fill="white"/>
  <circle cx="200" cy="40" r="2" fill="white"/>
  <circle cx="350" cy="50" r="2" fill="white"/>
  <circle cx="450" cy="30" r="2" fill="white"/>
  <!-- Tree silhouettes -->
  <polygon points="50,400 70,350 90,400" fill="#000"/>
  <polygon points="400,400 420,320 440,400" fill="#000"/>
</svg>