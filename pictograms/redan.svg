<?xml version="1.0" encoding="UTF-8"?>
<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <!-- White background -->
  <rect width="500" height="500" fill="white"/>
  
  <!-- Clock face -->
  <circle cx="200" cy="250" r="80" fill="white" stroke="#000" stroke-width="3.5"/>
  
  <!-- Clock hands showing completed time -->
  <line x1="200" y1="250" x2="200" y2="190" stroke="#000" stroke-width="5"/>
  <line x1="200" y1="250" x2="260" y2="250" stroke="#000" stroke-width="3"/>
  
  <!-- Center dot -->
  <circle cx="200" cy="250" r="5" fill="#000"/>
  
  <!-- Large checkmark indicating "already done" -->
  <path d="M 300 220 L 340 270 L 400 200" stroke="#66AA00" stroke-width="8" fill="none"/>
  
  <!-- Completion circle around checkmark -->
  <circle cx="350" cy="235" r="60" fill="none" stroke="#66AA00" stroke-width="3"/>
  
  <!-- Past time indicator (crossed out clock) -->
  <line x1="140" y1="190" x2="260" y2="310" stroke="#999999" stroke-width="3"/>
</svg>