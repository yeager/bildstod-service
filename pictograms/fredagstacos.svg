<?xml version="1.0" encoding="UTF-8"?>
<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <!-- White background -->
  <rect width="500" height="500" fill="white"/>
  
  <!-- Plate -->
  <ellipse cx="250" cy="380" rx="180" ry="35" fill="white" stroke="#000" stroke-width="3.5"/>
  
  <!-- Three tacos standing -->
  <!-- Taco shell 1 -->
  <path d="M 180 320 Q 200 250 220 320" fill="#FFD700" stroke="#000" stroke-width="3.5"/>
  <!-- Taco shell 2 -->
  <path d="M 230 320 Q 250 250 270 320" fill="#FFD700" stroke="#000" stroke-width="3.5"/>
  <!-- Taco shell 3 -->
  <path d="M 280 320 Q 300 250 320 320" fill="#FFD700" stroke="#000" stroke-width="3.5"/>
  
  <!-- Filling spilling out -->
  <!-- Lettuce -->
  <circle cx="195" cy="290" r="6" fill="#66AA00" stroke="#000" stroke-width="2"/>
  <circle cx="245" cy="290" r="6" fill="#66AA00" stroke="#000" stroke-width="2"/>
  <circle cx="295" cy="290" r="6" fill="#66AA00" stroke="#000" stroke-width="2"/>
  
  <!-- Meat -->
  <ellipse cx="210" cy="300" rx="8" ry="4" fill="#8B5E2A" stroke="#000" stroke-width="2"/>
  <ellipse cx="260" cy="300" rx="8" ry="4" fill="#8B5E2A" stroke="#000" stroke-width="2"/>
  <ellipse cx="310" cy="300" rx="8" ry="4" fill="#8B5E2A" stroke="#000" stroke-width="2"/>
  
  <!-- Cheese -->
  <rect x="185" y="305" width="12" height="3" fill="#FFD700" stroke="#000" stroke-width="1"/>
  <rect x="235" y="305" width="12" height="3" fill="#FFD700" stroke="#000" stroke-width="1"/>
  <rect x="285" y="305" width="12" height="3" fill="#FFD700" stroke="#000" stroke-width="1"/>
  
  <!-- Tomato -->
  <circle cx="205" cy="285" r="3" fill="#CC0000" stroke="#000" stroke-width="1"/>
  <circle cx="255" cy="285" r="3" fill="#CC0000" stroke="#000" stroke-width="1"/>
  <circle cx="305" cy="285" r="3" fill="#CC0000" stroke="#000" stroke-width="1"/>
</svg>