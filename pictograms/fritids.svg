<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <!-- Fritids (After-school care) - building with play elements -->
  <!-- Building -->
  <rect x="80" y="160" width="340" height="240" rx="5" fill="#FFF9C4" stroke="#000" stroke-width="3.5"/>
  <!-- Roof -->
  <rect x="70" y="145" width="360" height="25" rx="5" fill="#FF8F00" stroke="#000" stroke-width="3.5"/>
  <!-- Door -->
  <rect x="220" y="300" width="60" height="100" rx="4" fill="#5D4037" stroke="#000" stroke-width="2.5"/>
  <circle cx="268" cy="355" r="4" fill="#FFD700"/>
  <!-- Window with children -->
  <rect x="100" y="200" width="90" height="70" rx="3" fill="#BBDEFB" stroke="#000" stroke-width="2.5"/>
  <line x1="145" y1="200" x2="145" y2="270" stroke="#000" stroke-width="2"/>
  <line x1="100" y1="235" x2="190" y2="235" stroke="#000" stroke-width="2"/>
  <!-- Small face in window -->
  <circle cx="122" cy="250" r="8" fill="#F5DEB3"/>
  <circle cx="120" cy="248" r="1.5" fill="#000"/>
  <circle cx="124" cy="248" r="1.5" fill="#000"/>
  <rect x="310" y="200" width="90" height="70" rx="3" fill="#BBDEFB" stroke="#000" stroke-width="2.5"/>
  <line x1="355" y1="200" x2="355" y2="270" stroke="#000" stroke-width="2"/>
  <line x1="310" y1="235" x2="400" y2="235" stroke="#000" stroke-width="2"/>
  <!-- Sign -->
  <rect x="160" y="165" width="180" height="28" rx="5" fill="#FFF" stroke="#000" stroke-width="2"/>
  <text x="250" y="185" text-anchor="middle" font-family="sans-serif" font-size="15" font-weight="bold" fill="#333">FRITIDS</text>
  <!-- Playground elements outside -->
  <!-- Swing -->
  <rect x="40" y="360" width="6" height="80" fill="#795548" stroke="#000" stroke-width="1.5"/>
  <rect x="10" y="355" width="72" height="8" rx="3" fill="#795548" stroke="#000" stroke-width="2"/>
  <line x1="35" y1="363" x2="35" y2="410" stroke="#333" stroke-width="2"/>
  <line x1="55" y1="363" x2="45" y2="410" stroke="#333" stroke-width="2"/>
  <rect x="30" y="410" width="20" height="6" rx="2" fill="#E53935" stroke="#000" stroke-width="1.5"/>
  <!-- Ball -->
  <circle cx="440" cy="380" r="22" fill="#2196F3" stroke="#000" stroke-width="2.5"/>
  <path d="M425 370 Q440 380 455 370" fill="none" stroke="#FFF" stroke-width="2"/>
  <!-- Ground -->
  <rect x="0" y="400" width="500" height="100" fill="#7CB342"/>
  <!-- Clock on building -->
  <circle cx="250" cy="140" r="12" fill="#FFF" stroke="#000" stroke-width="2"/>
  <line x1="250" y1="133" x2="250" y2="140" stroke="#000" stroke-width="2"/>
  <line x1="250" y1="140" x2="256" y2="143" stroke="#000" stroke-width="2"/>
</svg>