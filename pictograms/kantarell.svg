<?xml version="1.0" encoding="UTF-8"?>
<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="500" height="500" fill="white"/>
  <!-- Mushroom caps -->
  <path d="M 150 250 Q 200 200 250 250 Q 200 280 150 250" fill="#FFD700" stroke="#000" stroke-width="3"/>
  <path d="M 250 280 Q 300 230 350 280 Q 300 310 250 280" fill="#FFD700" stroke="#000" stroke-width="3"/>
  <!-- Mushroom stems -->
  <rect x="190" y="250" width="20" height="60" fill="#FFD5B0" stroke="#000" stroke-width="2"/>
  <rect x="290" y="280" width="20" height="50" fill="#FFD5B0" stroke="#000" stroke-width="2"/>
  <!-- Mushroom gills -->
  <path d="M 170 240 Q 200 235 230 240" stroke="#E6C200" stroke-width="1" fill="none"/>
  <path d="M 270 270 Q 300 265 330 270" stroke="#E6C200" stroke-width="1" fill="none"/>
  <!-- Forest floor -->
  <rect y="350" width="500" height="150" fill="#8B5E2A"/>
  <ellipse cx="150" cy="370" rx="20" ry="5" fill="#66AA00"/>
  <ellipse cx="350" cy="380" rx="25" ry="6" fill="#66AA00"/>
</svg>