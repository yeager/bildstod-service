<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <!-- Lucia - Girl with candle crown and white gown -->
  
  <!-- White gown -->
  <path d="M175 200 L140 430 Q140 440 250 440 Q360 440 360 430 L325 200 Z" fill="#FFFFFF" stroke="#000" stroke-width="3.5" stroke-linejoin="round" stroke-linecap="round"/>
  
  <!-- Red sash -->
  <path d="M180 260 L170 290 Q170 295 250 295 Q330 295 330 290 L320 260 Q320 255 250 255 Q180 255 180 260 Z" fill="#CC0000" stroke="#000" stroke-width="2.5"/>
  
  <!-- Neck -->
  <rect x="230" y="175" width="40" height="30" rx="5" fill="#F5DEB3" stroke="#000" stroke-width="3"/>
  
  <!-- Head -->
  <circle cx="250" cy="150" r="50" fill="#F5DEB3" stroke="#000" stroke-width="3.5"/>
  
  <!-- Hair (blonde, long) -->
  <path d="M200 140 Q200 100 250 95 Q300 100 300 140 L310 200 Q310 220 300 230 L290 200 L280 220 L270 185 L260 200 L250 185 L240 200 L230 185 L220 220 L210 200 L200 230 Q190 220 190 200 Z" fill="#F4C542" stroke="#000" stroke-width="2.5"/>
  
  <!-- Eyes -->
  <circle cx="235" cy="148" r="4" fill="#000"/>
  <circle cx="265" cy="148" r="4" fill="#000"/>
  
  <!-- Mouth (smile) -->
  <path d="M240 165 Q250 172 260 165" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Lucia crown (lingonberry wreath with candles) -->
  <path d="M210 105 Q210 88 250 85 Q290 88 290 105" fill="none" stroke="#2D8B2D" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Lingonberries on crown -->
  <circle cx="215" cy="97" r="5" fill="#CC0000" stroke="#8B0000" stroke-width="1"/>
  <circle cx="235" cy="90" r="5" fill="#CC0000" stroke="#8B0000" stroke-width="1"/>
  <circle cx="250" cy="87" r="5" fill="#CC0000" stroke="#8B0000" stroke-width="1"/>
  <circle cx="265" cy="90" r="5" fill="#CC0000" stroke="#8B0000" stroke-width="1"/>
  <circle cx="285" cy="97" r="5" fill="#CC0000" stroke="#8B0000" stroke-width="1"/>
  
  <!-- Candles on crown -->
  <rect x="220" y="62" width="6" height="28" rx="2" fill="#FFFFFF" stroke="#000" stroke-width="1.5"/>
  <rect x="247" y="55" width="6" height="30" rx="2" fill="#FFFFFF" stroke="#000" stroke-width="1.5"/>
  <rect x="274" y="62" width="6" height="28" rx="2" fill="#FFFFFF" stroke="#000" stroke-width="1.5"/>
  
  <!-- Candle flames -->
  <path d="M223 62 Q220 50 223 42 Q226 50 223 62" fill="#FFD700" stroke="#F4A900" stroke-width="1"/>
  <path d="M250 55 Q247 43 250 35 Q253 43 250 55" fill="#FFD700" stroke="#F4A900" stroke-width="1"/>
  <path d="M277 62 Q274 50 277 42 Q280 50 277 62" fill="#FFD700" stroke="#F4A900" stroke-width="1"/>
  
  <!-- Hands holding candle -->
  <circle cx="185" cy="300" r="12" fill="#F5DEB3" stroke="#000" stroke-width="2.5"/>
  <rect x="180" y="275" width="10" height="30" rx="3" fill="#FFFFFF" stroke="#000" stroke-width="1.5"/>
  <path d="M185 275 Q182 265 185 257 Q188 265 185 275" fill="#FFD700" stroke="#F4A900" stroke-width="1"/>
</svg>