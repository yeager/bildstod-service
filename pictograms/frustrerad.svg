<?xml version="1.0" encoding="UTF-8"?>
<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <!-- White background -->
  <rect width="500" height="500" fill="white"/>
  
  <!-- Face -->
  <circle cx="250" cy="250" r="80" fill="#FFD5B0" stroke="#000" stroke-width="3.5"/>
  
  <!-- Angry eyes -->
  <circle cx="230" cy="230" r="4" fill="#000"/>
  <circle cx="270" cy="230" r="4" fill="#000"/>
  
  <!-- Clenched teeth frown -->
  <rect x="220" y="275" width="60" height="8" fill="white" stroke="#000" stroke-width="2"/>
  <line x1="230" y1="275" x2="230" y2="283" stroke="#000" stroke-width="1"/>
  <line x1="240" y1="275" x2="240" y2="283" stroke="#000" stroke-width="1"/>
  <line x1="250" y1="275" x2="250" y2="283" stroke="#000" stroke-width="1"/>
  <line x1="260" y1="275" x2="260" y2="283" stroke="#000" stroke-width="1"/>
  <line x1="270" y1="275" x2="270" y2="283" stroke="#000" stroke-width="1"/>
  
  <!-- Angry eyebrows -->
  <path d="M 210 215 L 240 225" stroke="#000" stroke-width="3"/>
  <path d="M 290 215 L 260 225" stroke="#000" stroke-width="3"/>
  
  <!-- Frustration lines around head -->
  <path d="M 150 200 L 140 190" stroke="#CC0000" stroke-width="3"/>
  <path d="M 350 200 L 360 190" stroke="#CC0000" stroke-width="3"/>
  <path d="M 180 150 L 170 140" stroke="#CC0000" stroke-width="3"/>
  <path d="M 320 150 L 330 140" stroke="#CC0000" stroke-width="3"/>
</svg>