  <!-- Steam lines -->
  <path d="M 200 280 Q 205 270 195 260" stroke="#999999" stroke-width="2" fill="none"/>
  <path d="M 300 280 Q 295 270 305 260" stroke="#999999" stroke-width="2" fill="none"/>
