<?xml version="1.0" encoding="UTF-8"?>
<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="500" height="500" fill="white"/>
  <!-- Pot -->
  <rect x="150" y="250" width="200" height="100" fill="#999999" stroke="#000" stroke-width="3" rx="10"/>
  <!-- Pot lid -->
  <ellipse cx="250" cy="250" rx="110" ry="20" fill="#999999" stroke="#000" stroke-width="3"/>
  <!-- Handle -->
  <rect x="360" y="290" width="40" height="10" fill="#8B5E2A" stroke="#000" stroke-width="2"/>
  <!-- Steam -->
  <path d="M 200 230 Q 210 210 200 190" stroke="#999999" stroke-width="3" fill="none"/>
  <path d="M 250 230 Q 240 210 250 190" stroke="#999999" stroke-width="3" fill="none"/>
  <path d="M 300 230 Q 310 210 300 190" stroke="#999999" stroke-width="3" fill="none"/>
  <!-- Stove burner -->
  <circle cx="250" cy="380" r="80" fill="#CC0000" stroke="#000" stroke-width="3"/>
  <circle cx="250" cy="380" r="60" fill="#FF8800"/>
  <circle cx="250" cy="380" r="40" fill="#FFD700"/>
</svg>