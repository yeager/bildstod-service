<?xml version="1.0" encoding="UTF-8"?>
<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <!-- White background -->
  <rect width="500" height="500" fill="white"/>
  
  <!-- Clock face -->
  <circle cx="250" cy="250" r="100" fill="white" stroke="#000" stroke-width="3.5"/>
  
  <!-- Clock numbers -->
  <circle cx="250" cy="170" r="3" fill="#000"/>  <!-- 12 -->
  <circle cx="330" cy="250" r="3" fill="#000"/>  <!-- 3 -->
  <circle cx="250" cy="330" r="3" fill="#000"/>  <!-- 6 -->
  <circle cx="170" cy="250" r="3" fill="#000"/>  <!-- 9 -->
  
  <!-- Clock hands showing very close to target time -->
  <line x1="250" y1="250" x2="315" y2="255" stroke="#000" stroke-width="5"/>  <!-- Hour hand -->
  <line x1="250" y1="250" x2="270" y2="180" stroke="#000" stroke-width="3"/>  <!-- Minute hand -->
  
  <!-- Center dot -->
  <circle cx="250" cy="250" r="6" fill="#000"/>
  
  <!-- Multiple arrows showing imminent time -->
  <path d="M 360 230 L 390 230 L 385 225 M 390 230 L 385 235" stroke="#CC0000" stroke-width="4" fill="none"/>
  <path d="M 360 250 L 390 250 L 385 245 M 390 250 L 385 255" stroke="#CC0000" stroke-width="4" fill="none"/>
  <path d="M 360 270 L 390 270 L 385 265 M 390 270 L 385 275" stroke="#CC0000" stroke-width="4" fill="none"/>
  
  <!-- Speed lines -->
  <line x1="365" y1="220" x2="375" y2="220" stroke="#CC0000" stroke-width="2"/>
  <line x1="365" y1="280" x2="375" y2="280" stroke="#CC0000" stroke-width="2"/>
  <line x1="400" y1="240" x2="410" y2="240" stroke="#CC0000" stroke-width="2"/>
  <line x1="400" y1="260" x2="410" y2="260" stroke="#CC0000" stroke-width="2"/>
</svg>