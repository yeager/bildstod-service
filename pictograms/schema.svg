<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <!-- Schema/Schedule — ARASAAC style v3: child pointing at visual schedule on wall -->
  
  <!-- Wall schedule board -->
  <rect x="170" y="40" width="290" height="350" rx="8" fill="#FFF" stroke="#000" stroke-width="3.5"/>
  
  <!-- Row 1: Sun icon + checkmark (done) -->
  <rect x="195" y="65" width="240" height="80" rx="5" fill="#FFF" stroke="#000" stroke-width="3"/>
  <circle cx="235" cy="105" r="22" fill="#FFD700" stroke="#000" stroke-width="3.5"/>
  <!-- Checkmark -->
  <circle cx="400" cy="105" r="18" fill="#4CAF50" stroke="#000" stroke-width="3"/>
  <path d="M390 105 L397 114 L412 96" fill="none" stroke="#FFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Row 2: Pencil icon + arrow (current) -->
  <rect x="195" y="160" width="240" height="80" rx="5" fill="#FFF" stroke="#000" stroke-width="3"/>
  <!-- Pencil -->
  <rect x="215" y="185" width="35" height="12" rx="2" fill="#FF8800" stroke="#000" stroke-width="3" transform="rotate(-30 232 191)"/>
  <!-- Arrow pointing at this row -->
  <path d="M170 200 L190 200" fill="none" stroke="#E00000" stroke-width="5" stroke-linecap="round"/>
  <polygon points="188,192 198,200 188,208" fill="#E00000" stroke="#000" stroke-width="2"/>
  
  <!-- Row 3: Ball icon (upcoming) -->
  <rect x="195" y="255" width="240" height="80" rx="5" fill="#FFF" stroke="#000" stroke-width="3"/>
  <circle cx="235" cy="295" r="22" fill="#E00000" stroke="#000" stroke-width="3.5"/>
  <path d="M222 286 Q235 295 248 286" fill="none" stroke="#FFF" stroke-width="2.5"/>
  
  <!-- Child pointing at schedule -->
  <!-- Head -->
  <circle cx="95" cy="220" r="35" fill="#FFD5B0" stroke="#000" stroke-width="3.5"/>
  <!-- Hair -->
  <path d="M65 205 Q70 180 95 172 Q120 180 125 205" fill="#8B5E2A" stroke="#000" stroke-width="2.5"/>
  <!-- Eyes -->
  <circle cx="85" cy="218" r="4" fill="#000"/>
  <circle cx="105" cy="218" r="4" fill="#000"/>
  <!-- Smile -->
  <path d="M85 232 Q95 242 105 232" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round"/>
  <!-- Body -->
  <rect x="72" y="255" width="46" height="55" rx="5" fill="#0099DD" stroke="#000" stroke-width="3.5"/>
  <!-- Arm pointing right -->
  <path d="M118 270 L165 210" fill="none" stroke="#FFD5B0" stroke-width="10" stroke-linecap="round"/>
  <path d="M118 270 L165 210" fill="none" stroke="#000" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Hand -->
  <circle cx="165" cy="210" r="8" fill="#FFD5B0" stroke="#000" stroke-width="2.5"/>
  <!-- Other arm -->
  <path d="M72 270 L50 300" fill="none" stroke="#FFD5B0" stroke-width="10" stroke-linecap="round"/>
  <path d="M72 270 L50 300" fill="none" stroke="#000" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Legs -->
  <rect x="75" y="308" width="18" height="45" rx="4" fill="#0099DD" stroke="#000" stroke-width="3"/>
  <rect x="97" y="308" width="18" height="45" rx="4" fill="#0099DD" stroke="#000" stroke-width="3"/>
  <!-- Shoes -->
  <ellipse cx="84" cy="358" rx="14" ry="8" fill="#000"/>
  <ellipse cx="106" cy="358" rx="14" ry="8" fill="#000"/>
</svg>