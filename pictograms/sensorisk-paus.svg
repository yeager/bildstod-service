<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <!-- Sensorisk paus (Sensory Break) - child with calming elements -->
  <!-- Soft background circle -->
  <circle cx="250" cy="250" r="200" fill="#E8F5E9" stroke="#000" stroke-width="3"/>
  <!-- Child sitting cross-legged -->
  <!-- Head -->
  <circle cx="250" cy="180" r="45" fill="#F5DEB3" stroke="#000" stroke-width="3.5"/>
  <!-- Hair -->
  <path d="M205 175 Q205 145 250 138 Q295 145 295 175" fill="#5D4037" stroke="#000" stroke-width="2.5"/>
  <!-- Eyes closed (peaceful) -->
  <path d="M230 185 Q237 190 244 185" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M256 185 Q263 190 270 185" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Calm smile -->
  <path d="M238 200 Q250 207 262 200" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round"/>
  <!-- Body -->
  <path d="M215 225 Q210 280 200 320 L300 320 Q290 280 285 225 Z" fill="#7E57C2" stroke="#000" stroke-width="3"/>
  <!-- Crossed legs -->
  <path d="M200 320 Q220 340 250 330 Q280 340 300 320" fill="#42A5F5" stroke="#000" stroke-width="3"/>
  <ellipse cx="250" cy="345" rx="60" ry="15" fill="#42A5F5" stroke="#000" stroke-width="3"/>
  <!-- Arms resting on knees -->
  <path d="M215 260 Q190 290 200 320" fill="none" stroke="#F5DEB3" stroke-width="14" stroke-linecap="round"/>
  <path d="M285 260 Q310 290 300 320" fill="none" stroke="#F5DEB3" stroke-width="14" stroke-linecap="round"/>
  <path d="M215 260 Q190 290 200 320" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round"/>
  <path d="M285 260 Q310 290 300 320" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round"/>
  <!-- Pause symbol -->
  <rect x="110" y="120" width="14" height="40" rx="3" fill="#7E57C2" stroke="#000" stroke-width="2"/>
  <rect x="132" y="120" width="14" height="40" rx="3" fill="#7E57C2" stroke="#000" stroke-width="2"/>
  <!-- Calming waves -->
  <path d="M340 150 Q360 140 380 150 Q400 160 420 150" fill="none" stroke="#81C784" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
  <path d="M350 170 Q370 160 390 170 Q410 180 430 170" fill="none" stroke="#81C784" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  <path d="M345 190 Q365 180 385 190" fill="none" stroke="#81C784" stroke-width="2.5" stroke-linecap="round" opacity="0.3"/>
</svg>