<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Table -->
  <ellipse cx="250" cy="350" rx="180" ry="30" fill="#8B5E2A" stroke="#000" stroke-width="3.5"/>
  <rect x="100" y="350" width="25" height="80" fill="#8B5E2A" stroke="#000" stroke-width="3.5"/>
  <rect x="375" y="350" width="25" height="80" fill="#8B5E2A" stroke="#000" stroke-width="3.5"/>
  
  <!-- Lunch tray -->
  <rect x="180" y="280" width="140" height="100" fill="#0099DD" stroke="#000" stroke-width="3.5"/>
  
  <!-- Food compartments -->
  <rect x="190" y="290" width="50" height="35" fill="#FFFFFF" stroke="#000" stroke-width="2"/>
  <rect x="250" y="290" width="60" height="35" fill="#FFFFFF" stroke="#000" stroke-width="2"/>
  <rect x="190" y="335" width="120" height="35" fill="#FFFFFF" stroke="#000" stroke-width="2"/>
  
  <!-- Food items -->
  <!-- Meatballs -->
  <circle cx="210" cy="305" r="8" fill="#8B5E2A"/>
  <circle cx="225" cy="310" r="8" fill="#8B5E2A"/>
  
  <!-- Vegetables -->
  <ellipse cx="275" cy="305" rx="15" ry="8" fill="#66AA00"/>
  <ellipse cx="290" cy="310" rx="12" ry="6" fill="#FF8800"/>
  
  <!-- Potatoes -->
  <ellipse cx="220" cy="350" rx="12" ry="8" fill="#FFD700"/>
  <ellipse cx="250" cy="355" rx="10" ry="7" fill="#FFD700"/>
  <ellipse cx="280" cy="350" rx="11" ry="8" fill="#FFD700"/>
  
  <!-- Glass of milk -->
  <rect x="340" y="290" width="30" height="50" fill="#FFFFFF" stroke="#000" stroke-width="3.5"/>
  <rect x="345" y="295" width="20" height="40" fill="#FFFFFF"/>
  
  <!-- Clock showing 12:00 -->
  <circle cx="100" cy="200" r="40" fill="#FFFFFF" stroke="#000" stroke-width="3.5"/>
  <path d="M100 160 L100 190" stroke="#000" stroke-width="3"/>
  <path d="M100 210 L100 240" stroke="#000" stroke-width="3"/>
  <path d="M60 200 L90 200" stroke="#000" stroke-width="3"/>
  <path d="M110 200 L140 200" stroke="#000" stroke-width="3"/>
  <path d="M100 200 L100 180" stroke="#000" stroke-width="4"/>
  <path d="M100 200 L100 170" stroke="#000" stroke-width="2"/>
</svg>