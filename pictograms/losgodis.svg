<?xml version="1.0" encoding="UTF-8"?>
<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <!-- White background -->
  <rect width="500" height="500" fill="white"/>
  
  <!-- Candy jar -->
  <rect x="150" y="200" width="200" height="180" fill="white" stroke="#000" stroke-width="3.5" rx="10"/>
  <rect x="170" y="180" width="160" height="30" fill="#0099DD" stroke="#000" stroke-width="3.5"/>
  <text x="250" y="200" fill="white" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold">GODIS</text>
  
  <!-- Lid -->
  <ellipse cx="250" cy="185" rx="85" ry="15" fill="#0099DD" stroke="#000" stroke-width="3.5"/>
  
  <!-- Mixed candies inside -->
  <!-- Gummy bears -->
  <ellipse cx="200" cy="250" rx="8" ry="12" fill="#CC0000" stroke="#000" stroke-width="2"/>
  <ellipse cx="280" cy="260" rx="8" ry="12" fill="#66AA00" stroke="#000" stroke-width="2"/>
  <ellipse cx="220" cy="280" rx="8" ry="12" fill="#FFD700" stroke="#000" stroke-width="2"/>
  
  <!-- Round candies -->
  <circle cx="260" cy="240" r="8" fill="#FF66CC" stroke="#000" stroke-width="2"/>
  <circle cx="190" cy="290" r="8" fill="#FF8800" stroke="#000" stroke-width="2"/>
  <circle cx="300" cy="300" r="8" fill="#0099DD" stroke="#000" stroke-width="2"/>
  
  <!-- Licorice pieces -->
  <rect x="240" y="320" width="20" height="6" fill="#000" stroke="#000" stroke-width="1"/>
  <rect x="210" y="330" width="20" height="6" fill="#000" stroke="#000" stroke-width="1"/>
  
  <!-- Sour candies -->
  <polygon points="280,320 290,330 280,340 270,330" fill="#66AA00" stroke="#000" stroke-width="2"/>
  <polygon points="230,310 240,320 230,330 220,320" fill="#CC0000" stroke="#000" stroke-width="2"/>
  
  <!-- Candy spilling out -->
  <circle cx="120" cy="380" r="6" fill="#FF66CC" stroke="#000" stroke-width="2"/>
  <circle cx="380" cy="370" r="6" fill="#FFD700" stroke="#000" stroke-width="2"/>
  <ellipse cx="350" cy="400" rx="6" ry="9" fill="#66AA00" stroke="#000" stroke-width="2"/>
</svg>