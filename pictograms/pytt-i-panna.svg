<?xml version="1.0" encoding="UTF-8"?>
<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <!-- White background -->
  <rect width="500" height="500" fill="white"/>
  
  <!-- Plate -->
  <ellipse cx="250" cy="320" rx="180" ry="35" fill="white" stroke="#000" stroke-width="3.5"/>
  
  <!-- Pan -->
  <ellipse cx="250" cy="240" rx="120" ry="20" fill="#999999" stroke="#000" stroke-width="3.5"/>
  <rect x="130" y="220" width="240" height="40" fill="#999999" stroke="#000" stroke-width="3.5"/>
  
  <!-- Pan handle -->
  <rect x="380" y="235" width="60" height="10" fill="#8B5E2A" stroke="#000" stroke-width="3.5"/>
  
  <!-- Pytt i panna contents (diced potatoes and meat) -->
  <!-- Potato cubes -->
  <rect x="170" y="230" width="15" height="15" fill="#FFD700" stroke="#000" stroke-width="2"/>
  <rect x="200" y="225" width="15" height="15" fill="#FFD700" stroke="#000" stroke-width="2"/>
  <rect x="230" y="235" width="15" height="15" fill="#FFD700" stroke="#000" stroke-width="2"/>
  <rect x="260" y="228" width="15" height="15" fill="#FFD700" stroke="#000" stroke-width="2"/>
  <rect x="290" y="233" width="15" height="15" fill="#FFD700" stroke="#000" stroke-width="2"/>
  <rect x="320" y="230" width="15" height="15" fill="#FFD700" stroke="#000" stroke-width="2"/>
  
  <!-- Meat pieces -->
  <rect x="185" y="238" width="12" height="10" fill="#8B5E2A" stroke="#000" stroke-width="2"/>
  <rect x="215" y="232" width="12" height="10" fill="#8B5E2A" stroke="#000" stroke-width="2"/>
  <rect x="275" y="235" width="12" height="10" fill="#8B5E2A" stroke="#000" stroke-width="2"/>
  <rect x="305" y="238" width="12" height="10" fill="#8B5E2A" stroke="#000" stroke-width="2"/>
  
  <!-- Onion pieces -->
  <circle cx="210" cy="240" r="4" fill="white" stroke="#000" stroke-width="2"/>
  <circle cx="250" cy="232" r="4" fill="white" stroke="#000" stroke-width="2"/>
  <circle cx="285" cy="240" r="4" fill="white" stroke="#000" stroke-width="2"/>
</svg>