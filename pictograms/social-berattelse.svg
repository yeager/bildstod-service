<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <!-- Social berättelse (Social Story) - open book with pictogram scenes -->
  <!-- Open book -->
  <path d="M60 120 Q60 100 100 100 L245 100 L245 400 L100 400 Q60 400 60 380 Z" fill="#FFF" stroke="#000" stroke-width="3.5" stroke-linejoin="round"/>
  <path d="M440 120 Q440 100 400 100 L255 100 L255 400 L400 400 Q440 400 440 380 Z" fill="#FFF" stroke="#000" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Spine -->
  <line x1="250" y1="95" x2="250" y2="405" stroke="#000" stroke-width="3"/>
  <!-- Left page: scene 1 - greeting -->
  <rect x="85" y="130" width="140" height="100" rx="5" fill="#E3F2FD" stroke="#999" stroke-width="1.5"/>
  <!-- Two stick figures -->
  <circle cx="130" cy="155" r="12" fill="#F5DEB3" stroke="#000" stroke-width="2"/>
  <line x1="130" y1="167" x2="130" y2="200" stroke="#000" stroke-width="2.5"/>
  <line x1="115" y1="180" x2="145" y2="180" stroke="#000" stroke-width="2.5"/>
  <circle cx="180" cy="155" r="12" fill="#F5DEB3" stroke="#000" stroke-width="2"/>
  <line x1="180" y1="167" x2="180" y2="200" stroke="#000" stroke-width="2.5"/>
  <line x1="165" y1="180" x2="195" y2="180" stroke="#000" stroke-width="2.5"/>
  <!-- Speech bubble -->
  <ellipse cx="155" cy="145" rx="15" ry="8" fill="#FFF" stroke="#000" stroke-width="1.5"/>
  <text x="155" y="148" text-anchor="middle" font-size="8" fill="#333">Hej!</text>
  <!-- Text lines under scene 1 -->
  <rect x="85" y="240" width="130" height="6" rx="3" fill="#888"/>
  <rect x="85" y="254" width="110" height="6" rx="3" fill="#AAA"/>
  <rect x="85" y="268" width="120" height="6" rx="3" fill="#AAA"/>
  <!-- Left page: scene 2 -->
  <rect x="85" y="290" width="140" height="80" rx="5" fill="#FFF3E0" stroke="#999" stroke-width="1.5"/>
  <!-- Happy face -->
  <circle cx="155" cy="325" r="18" fill="#FFD700" stroke="#000" stroke-width="2"/>
  <circle cx="149" cy="320" r="2.5" fill="#000"/>
  <circle cx="161" cy="320" r="2.5" fill="#000"/>
  <path d="M147 332 Q155 338 163 332" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round"/>
  <!-- Right page: scene 3 -->
  <rect x="275" y="130" width="140" height="100" rx="5" fill="#F3E5F5" stroke="#999" stroke-width="1.5"/>
  <!-- Waiting figure -->
  <circle cx="345" cy="155" r="12" fill="#F5DEB3" stroke="#000" stroke-width="2"/>
  <line x1="345" y1="167" x2="345" y2="200" stroke="#000" stroke-width="2.5"/>
  <!-- Clock -->
  <circle cx="310" cy="170" r="12" fill="#FFF" stroke="#000" stroke-width="2"/>
  <line x1="310" y1="163" x2="310" y2="170" stroke="#000" stroke-width="2"/>
  <line x1="310" y1="170" x2="316" y2="172" stroke="#000" stroke-width="2"/>
  <!-- Text lines -->
  <rect x="275" y="240" width="130" height="6" rx="3" fill="#888"/>
  <rect x="275" y="254" width="100" height="6" rx="3" fill="#AAA"/>
  <rect x="275" y="268" width="115" height="6" rx="3" fill="#AAA"/>
  <!-- Right page: thumbs up -->
  <rect x="275" y="290" width="140" height="80" rx="5" fill="#E8F5E9" stroke="#999" stroke-width="1.5"/>
  <!-- Thumbs up -->
  <path d="M335 340 L335 315 Q340 305 350 310 L360 310 L360 340 Z" fill="#F5DEB3" stroke="#000" stroke-width="2.5" stroke-linejoin="round"/>
  <circle cx="347" cy="330" r="12" fill="#4CAF50"/>
  <path d="M341 330 L345 334 L353 325" fill="none" stroke="#FFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>