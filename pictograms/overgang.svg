<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <!-- Transition / Övergång (moving between activities) -->
  <!-- Left activity (reading) -->
  <rect x="40" y="150" width="160" height="200" rx="10" fill="#E3F2FD" stroke="#000" stroke-width="3"/>
  <rect x="80" y="190" width="80" height="60" rx="5" fill="#1976D2" stroke="#000" stroke-width="2"/>
  <rect x="88" y="198" width="64" height="4" fill="#FFF"/>
  <rect x="88" y="208" width="50" height="4" fill="#FFF"/>
  <rect x="88" y="218" width="58" height="4" fill="#FFF"/>
  <rect x="88" y="228" width="40" height="4" fill="#FFF"/>
  <!-- Check mark (done) -->
  <circle cx="120" cy="310" r="18" fill="#4CAF50"/>
  <path d="M110 310 L117 317 L130 303" fill="none" stroke="#FFF" stroke-width="3" stroke-linecap="round"/>
  <!-- Arrow (transition) -->
  <path d="M215 250 L285 250" fill="none" stroke="#FF9800" stroke-width="5" stroke-linecap="round"/>
  <path d="M275 240 L285 250 L275 260" fill="none" stroke="#FF9800" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Timer on arrow -->
  <circle cx="250" cy="220" r="18" fill="#FFF" stroke="#FF9800" stroke-width="2.5"/>
  <line x1="250" y1="208" x2="250" y2="220" stroke="#FF9800" stroke-width="2.5"/>
  <line x1="250" y1="220" x2="258" y2="224" stroke="#FF9800" stroke-width="2.5"/>
  <!-- Right activity (play) -->
  <rect x="300" y="150" width="160" height="200" rx="10" fill="#FFF3E0" stroke="#000" stroke-width="3"/>
  <circle cx="380" cy="230" r="35" fill="#E53935" stroke="#000" stroke-width="2.5"/>
  <path d="M365 218 Q380 230 395 218" fill="none" stroke="#FFF" stroke-width="2.5"/>
  <!-- Question mark (upcoming) -->
  <circle cx="380" cy="310" r="18" fill="#FF9800"/>
  <text x="380" y="317" text-anchor="middle" font-family="sans-serif" font-size="22" font-weight="bold" fill="#FFF">?</text>
  <!-- Footprints between -->
  <circle cx="230" cy="280" r="4" fill="#999"/>
  <circle cx="245" cy="285" r="3" fill="#999"/>
  <circle cx="260" cy="280" r="4" fill="#999"/>
  <circle cx="275" cy="285" r="3" fill="#999"/>
</svg>