<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Forest background -->
  <rect x="0" y="0" width="500" height="500" fill="#66AA00"/>
  
  <!-- Trees -->
  <circle cx="100" cy="150" r="30" fill="#66AA00" stroke="#000" stroke-width="2"/>
  <rect x="96" y="150" width="8" height="40" fill="#8B5E2A" stroke="#000" stroke-width="2"/>
  
  <circle cx="350" cy="120" r="35" fill="#66AA00" stroke="#000" stroke-width="2"/>
  <rect x="346" y="120" width="8" height="45" fill="#8B5E2A" stroke="#000" stroke-width="2"/>
  
  <circle cx="450" cy="200" r="25" fill="#66AA00" stroke="#000" stroke-width="2"/>
  <rect x="446" y="200" width="8" height="35" fill="#8B5E2A" stroke="#000" stroke-width="2"/>
  
  <circle cx="80" cy="350" r="28" fill="#66AA00" stroke="#000" stroke-width="2"/>
  <rect x="76" y="350" width="8" height="38" fill="#8B5E2A" stroke="#000" stroke-width="2"/>
  
  <!-- Runner with compass -->
  <circle cx="250" cy="200" r="25" fill="#FFD5B0" stroke="#000" stroke-width="3.5"/>
  <circle cx="242" cy="192" r="4" fill="#000"/>
  <circle cx="258" cy="192" r="4" fill="#000"/>
  <path d="M235 210 Q250 220 265 210" fill="none" stroke="#000" stroke-width="2"/>
  <rect x="240" y="225" width="20" height="50" fill="#FFFFFF" stroke="#000" stroke-width="3.5"/>
  
  <!-- Running legs -->
  <rect x="235" y="275" width="10" height="45" fill="#FFD700" stroke="#000" stroke-width="3.5" transform="rotate(-15 240 297)"/>
  <rect x="255" y="275" width="10" height="45" fill="#FFD700" stroke="#000" stroke-width="3.5" transform="rotate(20 260 297)"/>
  
  <!-- Running shoes -->
  <ellipse cx="225" cy="330" rx="20" ry="8" fill="#000" stroke="#000" stroke-width="3"/>
  <ellipse cx="275" cy="330" rx="20" ry="8" fill="#000" stroke="#000" stroke-width="3"/>
  
  <!-- Compass in hand -->
  <circle cx="210" cy="240" r="15" fill="#FFFFFF" stroke="#000" stroke-width="3.5"/>
  <circle cx="210" cy="240" r="12" fill="#CC0000"/>
  <path d="M210 228 L210 240" stroke="#000" stroke-width="3"/>
  <path d="M210 240 L222 240" stroke="#000" stroke-width="2"/>
  <circle cx="210" cy="240" r="3" fill="#000"/>
  
  <!-- Map in other hand -->
  <rect x="270" y="230" width="30" height="20" fill="#FFFFFF" stroke="#000" stroke-width="3"/>
  <path d="M275 235 L295 235" stroke="#0099DD" stroke-width="1"/>
  <path d="M275 240 L290 240" stroke="#66AA00" stroke-width="1"/>
  <path d="M275 245 L295 245" stroke="#8B5E2A" stroke-width="1"/>
  <circle cx="280" cy="238" r="2" fill="#CC0000"/>
  <circle cx="288" cy="242" r="2" fill="#CC0000"/>
  
  <!-- Control point flag -->
  <rect x="380" y="300" width="4" height="60" fill="#8B5E2A" stroke="#000" stroke-width="2"/>
  <rect x="384" y="300" width="40" height="25" fill="#FF8800" stroke="#000" stroke-width="3"/>
  <rect x="404" y="300" width="20" height="25" fill="#FFFFFF" stroke="#000" stroke-width="3"/>
  
  <!-- Control card -->
  <rect x="350" y="350" width="25" height="35" fill="#FFFFFF" stroke="#000" stroke-width="3"/>
  <rect x="355" y="355" width="15" height="3" fill="#000"/>
  <rect x="355" y="360" width="15" height="3" fill="#000"/>
  <rect x="355" y="365" width="15" height="3" fill="#000"/>
  <rect x="355" y="370" width="15" height="3" fill="#000"/>
  
  <!-- Punch holes -->
  <circle cx="360" cy="356" r="1" fill="#CC0000"/>
  <circle cx="365" cy="356" r="1" fill="#CC0000"/>
  <circle cx="368" cy="361" r="1" fill="#CC0000"/>
  
  <!-- Trail/path -->
  <path d="M150 400 Q200 380 250 390 Q300 400 350 380 Q400 370 450 380" 
        fill="none" stroke="#8B5E2A" stroke-width="6" stroke-dasharray="10,5"/>
</svg>