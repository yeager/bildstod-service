<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Person having meltdown -->
  <circle cx="250" cy="200" r="30" fill="#FFD5B0" stroke="#000" stroke-width="3.5"/>
  
  <!-- Distressed facial expression -->
  <circle cx="240" cy="190" r="4" fill="#000"/>
  <circle cx="260" cy="190" r="4" fill="#000"/>
  <path d="M235 210 Q250 225 265 210" fill="none" stroke="#000" stroke-width="3"/>
  
  <!-- Tears -->
  <path d="M235 205 Q230 215 235 225" fill="#0099DD" stroke="#0099DD" stroke-width="2"/>
  <path d="M265 205 Q270 215 265 225" fill="#0099DD" stroke="#0099DD" stroke-width="2"/>
  
  <!-- Body in distress position -->
  <rect x="240" y="230" width="20" height="50" fill="#CC0000" stroke="#000" stroke-width="3.5"/>
  
  <!-- Arms flailing -->
  <ellipse cx="210" cy="250" rx="12" ry="30" fill="#FFD5B0" stroke="#000" stroke-width="3.5" transform="rotate(-45 210 250)"/>
  <ellipse cx="290" cy="250" rx="12" ry="30" fill="#FFD5B0" stroke="#000" stroke-width="3.5" transform="rotate(45 290 250)"/>
  
  <!-- Motion lines around head -->
  <path d="M180 170 Q190 160 200 170" fill="none" stroke="#CC0000" stroke-width="3"/>
  <path d="M300 170 Q310 160 320 170" fill="none" stroke="#CC0000" stroke-width="3"/>
  <path d="M170 200 Q160 190 170 180" fill="none" stroke="#CC0000" stroke-width="3"/>
  <path d="M330 200 Q340 190 330 180" fill="none" stroke="#CC0000" stroke-width="3"/>
  
  <!-- Legs -->
  <rect x="235" y="280" width="10" height="40" fill="#0099DD" stroke="#000" stroke-width="3.5"/>
  <rect x="255" y="280" width="10" height="40" fill="#0099DD" stroke="#000" stroke-width="3.5"/>
  
  <!-- Feet -->
  <ellipse cx="240" cy="330" rx="12" ry="8" fill="#000"/>
  <ellipse cx="260" cy="330" rx="12" ry="8" fill="#000"/>
  
  <!-- Overwhelm symbols -->
  <path d="M150 150 L170 130 M150 130 L170 150" stroke="#FF8800" stroke-width="4"/>
  <path d="M330 150 L350 130 M330 130 L350 150" stroke="#FF8800" stroke-width="4"/>
  <path d="M100 250 L120 230 M100 230 L120 250" stroke="#FF8800" stroke-width="4"/>
  <path d="M380 250 L400 230 M380 230 L400 250" stroke="#FF8800" stroke-width="4"/>
  
  <!-- Ground -->
  <rect x="0" y="330" width="500" height="170" fill="#999999"/>
  
  <!-- Support adult in background -->
  <circle cx="400" cy="180" r="20" fill="#FFD5B0" stroke="#000" stroke-width="3"/>
  <circle cx="395" cy="175" r="3" fill="#000"/>
  <circle cx="405" cy="175" r="3" fill="#000"/>
  <path d="M390 185 Q400 195 410 185" fill="none" stroke="#000" stroke-width="2"/>
  <rect x="395" y="200" width="10" height="35" fill="#66AA00" stroke="#000" stroke-width="3"/>
  
  <!-- Calm hand gesture -->
  <ellipse cx="370" cy="210" rx="8" ry="15" fill="#FFD5B0" stroke="#000" stroke-width="3"/>
</svg>