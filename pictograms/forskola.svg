<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <!-- Förskola (Preschool) - small building with children -->
  <!-- Building -->
  <rect x="80" y="180" width="340" height="220" rx="5" fill="#FFECB3" stroke="#000" stroke-width="3.5"/>
  <!-- Roof -->
  <path d="M60 185 L250 80 L440 185 Z" fill="#E53935" stroke="#000" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Door -->
  <rect x="210" y="290" width="80" height="110" rx="5" fill="#8D6E63" stroke="#000" stroke-width="3"/>
  <circle cx="275" cy="350" r="5" fill="#FFD700"/>
  <!-- Windows -->
  <rect x="110" y="220" width="70" height="55" rx="3" fill="#BBDEFB" stroke="#000" stroke-width="2.5"/>
  <line x1="145" y1="220" x2="145" y2="275" stroke="#000" stroke-width="2"/>
  <line x1="110" y1="247" x2="180" y2="247" stroke="#000" stroke-width="2"/>
  <rect x="320" y="220" width="70" height="55" rx="3" fill="#BBDEFB" stroke="#000" stroke-width="2.5"/>
  <line x1="355" y1="220" x2="355" y2="275" stroke="#000" stroke-width="2"/>
  <line x1="320" y1="247" x2="390" y2="247" stroke="#000" stroke-width="2"/>
  <!-- Sign -->
  <rect x="170" y="195" width="160" height="30" rx="5" fill="#FFF" stroke="#000" stroke-width="2"/>
  <text x="250" y="217" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="bold" fill="#333">FÖRSKOLA</text>
  <!-- Sun -->
  <circle cx="420" cy="60" r="30" fill="#FFD700" stroke="#000" stroke-width="2.5"/>
  <!-- Child 1 (left) -->
  <circle cx="140" cy="370" r="15" fill="#F5DEB3" stroke="#000" stroke-width="2.5"/>
  <rect x="130" y="385" width="20" height="25" rx="3" fill="#2196F3" stroke="#000" stroke-width="2"/>
  <!-- Child 2 (right) -->
  <circle cx="370" cy="375" r="13" fill="#F5DEB3" stroke="#000" stroke-width="2.5"/>
  <rect x="361" y="388" width="18" height="22" rx="3" fill="#E91E63" stroke="#000" stroke-width="2"/>
  <!-- Ground -->
  <rect x="0" y="400" width="500" height="100" fill="#7CB342"/>
  <!-- Flowers -->
  <circle cx="60" cy="410" r="5" fill="#FFEB3B"/>
  <circle cx="450" cy="415" r="5" fill="#FF5722"/>
</svg>