<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <!-- Kräftskiva — ARASAAC style v3: single large crayfish on plate, clean and centered -->
  
  <!-- Plate -->
  <ellipse cx="250" cy="395" rx="180" ry="38" fill="#FFF" stroke="#000" stroke-width="3.5"/>
  
  <!-- Crayfish body (large, centered) -->
  <!-- Tail -->
  <path d="M210 340 Q200 365 210 385 Q230 400 250 400 Q270 400 290 385 Q300 365 290 340"
        fill="#E00000" stroke="#000" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Tail segments -->
  <line x1="220" y1="355" x2="280" y2="355" stroke="#B71C1C" stroke-width="2.5"/>
  <line x1="215" y1="370" x2="285" y2="370" stroke="#B71C1C" stroke-width="2.5"/>
  <line x1="218" y1="385" x2="282" y2="385" stroke="#B71C1C" stroke-width="2.5"/>
  
  <!-- Abdomen -->
  <path d="M215 220 Q215 195 250 185 Q285 195 285 220 L290 340 L210 340 Z"
        fill="#E00000" stroke="#000" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Segments -->
  <line x1="218" y1="250" x2="282" y2="250" stroke="#B71C1C" stroke-width="2.5"/>
  <line x1="215" y1="275" x2="285" y2="275" stroke="#B71C1C" stroke-width="2.5"/>
  <line x1="213" y1="300" x2="287" y2="300" stroke="#B71C1C" stroke-width="2.5"/>
  <line x1="212" y1="325" x2="288" y2="325" stroke="#B71C1C" stroke-width="2.5"/>
  
  <!-- Head/carapace -->
  <path d="M225 195 Q250 155 275 195" fill="#E00000" stroke="#000" stroke-width="3.5" stroke-linejoin="round"/>
  
  <!-- Eyes on stalks -->
  <line x1="238" y1="185" x2="228" y2="160" stroke="#000" stroke-width="3"/>
  <circle cx="228" cy="157" r="7" fill="#000"/>
  <circle cx="226" cy="155" r="2.5" fill="#FFF"/>
  <line x1="262" y1="185" x2="272" y2="160" stroke="#000" stroke-width="3"/>
  <circle cx="272" cy="157" r="7" fill="#000"/>
  <circle cx="270" cy="155" r="2.5" fill="#FFF"/>
  
  <!-- Antennae -->
  <path d="M240 180 Q215 140 190 115" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round"/>
  <path d="M260 180 Q285 140 310 115" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Claws (large, defining feature) -->
  <!-- Left claw -->
  <path d="M215 235 L160 205 L140 175" fill="none" stroke="#E00000" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M215 235 L160 205 L140 175" fill="none" stroke="#000" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Left pincer -->
  <path d="M140 175 L115 155 Q108 150 112 160 L125 170"
        fill="#E00000" stroke="#000" stroke-width="3.5" stroke-linejoin="round"/>
  <path d="M140 175 L125 195 Q120 202 128 198 L140 185"
        fill="#E00000" stroke="#000" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Right claw -->
  <path d="M285 235 L340 205 L360 175" fill="none" stroke="#E00000" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M285 235 L340 205 L360 175" fill="none" stroke="#000" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right pincer -->
  <path d="M360 175 L385 155 Q392 150 388 160 L375 170"
        fill="#E00000" stroke="#000" stroke-width="3.5" stroke-linejoin="round"/>
  <path d="M360 175 L375 195 Q380 202 372 198 L360 185"
        fill="#E00000" stroke="#000" stroke-width="3.5" stroke-linejoin="round"/>
  
  <!-- Walking legs (3 pairs) -->
  <path d="M218 255 L185 268" fill="none" stroke="#E00000" stroke-width="4" stroke-linecap="round"/>
  <path d="M218 280 L182 295" fill="none" stroke="#E00000" stroke-width="4" stroke-linecap="round"/>
  <path d="M218 305 L188 320" fill="none" stroke="#E00000" stroke-width="4" stroke-linecap="round"/>
  <path d="M282 255 L315 268" fill="none" stroke="#E00000" stroke-width="4" stroke-linecap="round"/>
  <path d="M282 280 L318 295" fill="none" stroke="#E00000" stroke-width="4" stroke-linecap="round"/>
  <path d="M282 305 L312 320" fill="none" stroke="#E00000" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Dill sprigs -->
  <path d="M130 345 Q118 320 122 295" fill="none" stroke="#2E7D32" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M122 315 L112 305" fill="none" stroke="#2E7D32" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M122 308 L132 298" fill="none" stroke="#2E7D32" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M370 345 Q382 320 378 295" fill="none" stroke="#2E7D32" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M378 315 L388 305" fill="none" stroke="#2E7D32" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M378 308 L368 298" fill="none" stroke="#2E7D32" stroke-width="2.5" stroke-linecap="round"/>
  
  <!-- Paper lantern (top corner, small) -->
  <ellipse cx="420" cy="60" rx="35" ry="28" fill="#FFD700" stroke="#000" stroke-width="3"/>
  <circle cx="410" cy="56" r="3" fill="#000"/>
  <circle cx="430" cy="56" r="3" fill="#000"/>
  <path d="M412 68 Q420 74 428 68" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round"/>
</svg>