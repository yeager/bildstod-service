<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <!-- Semla (Swedish cream bun) -->
  <!-- Bottom bun -->
  <ellipse cx="250" cy="340" rx="130" ry="50" fill="#D4A06A" stroke="#000" stroke-width="3.5"/>
  <rect x="120" y="260" width="260" height="80" fill="#D4A06A"/>
  <ellipse cx="250" cy="260" rx="130" ry="40" fill="#E0B87A" stroke="#000" stroke-width="3.5"/>
  <!-- Almond paste filling -->
  <ellipse cx="250" cy="265" rx="100" ry="25" fill="#C4A050" stroke="#000" stroke-width="2"/>
  <!-- Whipped cream -->
  <path d="M160 250 Q170 180 210 170 Q250 160 250 150 Q250 160 290 170 Q330 180 340 250 Z" fill="#FFFFF0" stroke="#000" stroke-width="3"/>
  <!-- Cream texture -->
  <path d="M190 220 Q220 200 250 210 Q280 200 310 220" fill="none" stroke="#EEE" stroke-width="2"/>
  <!-- Top bun lid -->
  <path d="M170 250 Q170 220 200 200 Q230 185 250 180 Q270 185 300 200 Q330 220 330 250" fill="#E0B87A" stroke="#000" stroke-width="3.5"/>
  <!-- Powdered sugar -->
  <circle cx="200" cy="215" r="2" fill="#FFF" opacity="0.7"/>
  <circle cx="230" cy="200" r="2" fill="#FFF" opacity="0.7"/>
  <circle cx="260" cy="195" r="2" fill="#FFF" opacity="0.7"/>
  <circle cx="290" cy="205" r="2" fill="#FFF" opacity="0.7"/>
  <circle cx="310" cy="225" r="2" fill="#FFF" opacity="0.7"/>
  <!-- Side outline -->
  <line x1="120" y1="260" x2="120" y2="340" stroke="#000" stroke-width="3.5"/>
  <line x1="380" y1="260" x2="380" y2="340" stroke="#000" stroke-width="3.5"/>
</svg>