<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <!-- Semla — ARASAAC style: Swedish cream bun, side view on plate -->
  
  <!-- Plate -->
  <ellipse cx="250" cy="410" rx="160" ry="30" fill="#FFF" stroke="#000" stroke-width="3.5"/>
  
  <!-- Bottom bun half -->
  <path d="M115 320 Q115 280 170 260 Q220 248 250 245 Q280 248 330 260 Q385 280 385 320 L385 350 Q380 370 340 380 Q290 390 250 390 Q210 390 160 380 Q120 370 115 350 Z"
        fill="#D4A24E" stroke="#000" stroke-width="3.5" stroke-linejoin="round"/>
  
  <!-- Almond paste filling (visible between bun halves) -->
  <path d="M140 280 Q160 310 250 320 Q340 310 360 280 Q350 300 250 308 Q150 300 140 280 Z"
        fill="#C4A35A" stroke="#000" stroke-width="2.5"/>
  
  <!-- Whipped cream (big fluffy mound) -->
  <path d="M145 280 Q145 230 180 210 Q210 195 250 190 Q290 195 320 210 Q355 230 355 280 
           Q340 285 300 278 Q270 275 250 278 Q230 275 200 278 Q160 285 145 280 Z"
        fill="#FFF" stroke="#000" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Cream texture highlights -->
  <path d="M180 240 Q200 230 220 240" fill="none" stroke="#EEE" stroke-width="2" stroke-linecap="round"/>
  <path d="M270 235 Q290 225 310 238" fill="none" stroke="#EEE" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Top bun half (lid, tilted slightly) -->
  <path d="M138 275 Q138 210 190 178 Q220 162 250 158 Q280 162 310 178 Q362 210 362 275
           Q340 268 300 265 Q270 263 250 265 Q230 263 200 265 Q160 268 138 275 Z"
        fill="#B8862B" stroke="#000" stroke-width="3.5" stroke-linejoin="round"/>
  
  <!-- Powdered sugar on top -->
  <circle cx="200" cy="200" r="3" fill="#FFF" opacity="0.8"/>
  <circle cx="230" cy="185" r="2.5" fill="#FFF" opacity="0.8"/>
  <circle cx="260" cy="182" r="3" fill="#FFF" opacity="0.8"/>
  <circle cx="290" cy="188" r="2.5" fill="#FFF" opacity="0.8"/>
  <circle cx="310" cy="205" r="3" fill="#FFF" opacity="0.8"/>
  <circle cx="180" cy="215" r="2.5" fill="#FFF" opacity="0.8"/>
  <circle cx="325" cy="220" r="2.5" fill="#FFF" opacity="0.8"/>
  <circle cx="245" cy="175" r="2" fill="#FFF" opacity="0.8"/>
  <circle cx="215" cy="192" r="2" fill="#FFF" opacity="0.8"/>
  <circle cx="275" cy="180" r="2" fill="#FFF" opacity="0.8"/>
  <circle cx="340" cy="235" r="2.5" fill="#FFF" opacity="0.8"/>
  <circle cx="160" cy="240" r="2.5" fill="#FFF" opacity="0.8"/>
</svg>